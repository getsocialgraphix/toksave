<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokSave Offline - Bulk Downloader</title>
    <!-- STANDALONE: Removed external CDNs to resolve Permission/Network Errors -->
    <style>
        /* Embedded CSS for Tailwind-like design without external dependencies */
        :root { --bg: #0b0a1a; --primary: #ec4899; --secondary: #4f46e5; --text: #f3f4f6; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #110f2c; border: 1px solid #1e1b4b; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #080718; color: white; border: 1px solid #312e81; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        button { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #1e1b4b; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>TokSave Offline</h1>
        
        <div class="card">
            <h3>Paste TikTok Links (one per line)</h3>
            <textarea id="urlInput" placeholder="Paste links here..."></textarea>
            <button onclick="processLinks()">Fetch Videos</button>
        </div>

        <div id="results" class="card hidden">
            <h3>Download Queue</h3>
            <div id="videoList"></div>
        </div>
    </div>

    <script>
      // Replace the old local logic with this call to your new live backend
function directDownload(tiktokUrl) {
    const backendUrl = "https://toksavebackend.onrender.com/download";
    window.location.href = `${backendUrl}?url=${encodeURIComponent(tiktokUrl)}`;
}
    </script>
</body>
</html>
